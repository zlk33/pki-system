services:
  db:
    image: postgres:15-alpine
    container_name: pki-db
    environment:
      POSTGRES_USER: pki_admin
      POSTGRES_PASSWORD: pki_password
      POSTGRES_DB: pki_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pki_admin -d pki_database"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: pki-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pki_admin:pki_password@db:5432/pki_database
    volumes:
      - ./backend:/app
      - certs_data:/app/certs
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    image: node:20-alpine
    container_name: pki-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  certs_data:
